services:
  postgres:
    image: postgres:alpine
    container_name: hr-easy-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hr_easy
      POSTGRES_PASSWORD: hr_easy_password
      POSTGRES_DB: hr_easy
    ports:
      - "5432:5432"
    volumes:
      - hr_easy_postgres_data:/var/lib/postgresql

  web:
    build: .
    container_name: hr-easy-web
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://hr_easy:hr_easy_password@postgres:5432/hr_easy?schema=public
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
    ports:
      - "3000:3000"

volumes:
  hr_easy_postgres_data:
